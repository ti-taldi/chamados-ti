<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sistema de Chamados TI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
/* Loading screen */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #0F1924;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.ls-logo {
  width: 60px; height: 60px; border-radius: 16px;
  background: rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: white; margin-bottom: 4px;
}
.ls-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 18px; font-weight: 600; color: white; }
.ls-sub   { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; color: rgba(255,255,255,.4); }
.ls-dots  { display: flex; gap: 7px; }
.ls-dot   { width: 8px; height: 8px; border-radius: 50%; background: rgba(2,132,199,.6); animation: lsdot 1.2s ease-in-out infinite; }
.ls-dot:nth-child(2){ animation-delay: .2s; }
.ls-dot:nth-child(3){ animation-delay: .4s; }
@keyframes lsdot { 0%,80%,100%{ transform:scale(.6); opacity:.4 } 40%{ transform:scale(1); opacity:1; background:#38BDF8; } }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0F1924;--navy2:#1a2d40;--bg:#F1F5F9;--white:#fff;--border:#E2E8F0;
  --text:#1E293B;--t2:#64748B;--t3:#94A3B8;
  --blue:#0284C7;--blue-bg:#E0F2FE;--blue-t:#0369A1;
  --green:#16A34A;--green-bg:#DCFCE7;--green-t:#15803D;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-t:#92400E;
  --red:#DC2626;--red-bg:#FEE2E2;--red-t:#991B1B;
  --orange-bg:#FFF7ED;--orange-t:#9A3412;
  --purple-bg:#F3E8FF;--purple-t:#6B21A8;
  --r:8px;--rl:12px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* AUTH */
.auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.auth-card{background:var(--white);border-radius:16px;padding:36px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:52px;height:52px;border-radius:12px;background:var(--navy);display:inline-flex;align-items:center;justify-content:center;color:white;font-size:26px;margin-bottom:10px}
.auth-logo h1{font-size:18px;font-weight:600}.auth-logo p{font-size:13px;color:var(--t2);margin-top:2px}
.auth-field{margin-bottom:16px}
.auth-label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.auth-input{width:100%;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.auth-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.remember-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);cursor:pointer;user-select:none}
.remember-row input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy)}
.auth-btn{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.auth-btn:hover{background:var(--navy2)}.auth-btn:disabled{background:var(--bg);color:var(--t3);cursor:not-allowed}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--t2)}
.auth-switch a{color:var(--blue);cursor:pointer;font-weight:500}
.auth-error{background:var(--red-bg);color:var(--red-t);font-size:13px;padding:10px 12px;border-radius:var(--r);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.auth-hint{background:var(--blue-bg);color:var(--blue-t);font-size:12px;padding:10px 12px;border-radius:var(--r);margin-bottom:16px;line-height:1.5}
.status-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.status-card{background:var(--white);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.status-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px}
/* NAVBAR */
.navbar{background:var(--navy);position:sticky;top:0;z-index:50;display:flex;align-items:center;padding:0 32px;height:56px;box-shadow:0 1px 0 rgba(255,255,255,.06)}
.navbar-brand{display:flex;align-items:center;gap:9px;color:white;font-size:15px;font-weight:600;margin-right:32px;flex-shrink:0}
.navbar-brand i{font-size:20px}
.navbar-nav{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto}
.nav-link{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:var(--r);color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative;flex-shrink:0}
.nav-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-link.active{background:rgba(2,132,199,.25);color:#38BDF8}
.nav-link i{font-size:16px}
.nav-badge{background:#EF4444;color:white;font-size:10px;font-weight:600;min-width:17px;height:17px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.navbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.navbar-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:13px}
.navbar-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.7)}
.navbar-username{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navbar-role{font-size:11px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);padding:2px 7px;border-radius:100px}
.navbar-logout{width:30px;height:30px;border-radius:var(--r);background:transparent;border:none;color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.navbar-logout:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.navbar-divider{width:1px;height:20px;background:rgba(255,255,255,.1)}
.btn-navbar{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-navbar:hover{background:rgba(255,255,255,.14);color:white}
.btn-navbar i{font-size:14px}
/* PAGE */
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:20px 0}
.page-header-inner{max-width:1200px;margin:0 auto;padding:0 32px}
.page-header h2{font-size:20px;font-weight:600}.page-header p{font-size:13px;color:var(--t2);margin-top:3px}
.page-body{max-width:1200px;margin:0 auto;padding:28px 32px}
/* FORMS */
input[type=text],input[type=date],input[type=password],textarea{width:100%;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select.sf{width:100%;padding:8px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
select.sf:focus{border-color:var(--blue)}
.form-wrap{max-width:640px;margin:0 auto}
.form-section{margin-bottom:22px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:8px}
.form-label span{color:var(--red)}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.cat-btn{padding:13px 8px;border:1px solid var(--border);border-radius:var(--rl);background:var(--white);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;color:var(--t2);transition:all .15s;font-family:'IBM Plex Sans',sans-serif;line-height:1.3}
.cat-btn:hover,.cat-btn.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t)}
.cat-btn.selected{font-weight:500}.cat-btn i{font-size:22px}
.prio-grid{display:flex;gap:8px;flex-wrap:wrap}
.prio-btn{padding:7px 20px;border:1px solid var(--border);border-radius:100px;background:transparent;cursor:pointer;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--t2);transition:all .15s}
.prio-btn:hover:not(.sel){background:var(--bg);border-color:var(--t3)}
.prio-btn.p-critica.sel{background:var(--red-bg);color:var(--red-t);border-color:#FCA5A5;font-weight:500}
.prio-btn.p-alta.sel{background:var(--orange-bg);color:var(--orange-t);border-color:#FED7AA;font-weight:500}
.prio-btn.p-media.sel{background:var(--amber-bg);color:var(--amber-t);border-color:#FCD34D;font-weight:500}
.prio-btn.p-baixa.sel{background:var(--green-bg);color:var(--green-t);border-color:#86EFAC;font-weight:500}
.btn-primary{width:100%;padding:12px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--navy2)}.btn-primary:disabled{background:var(--bg);color:var(--t3);cursor:not-allowed}
.btn-sec{padding:8px 16px;background:white;color:var(--text);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-sec:hover{background:var(--bg)}
.btn-icon{width:30px;height:30px;border-radius:var(--r);background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t2);transition:all .15s}
.btn-icon:hover{background:var(--bg);color:var(--text)}.btn-icon.danger:hover{background:var(--red-bg);color:var(--red-t);border-color:#FCA5A5}
.btn-save{padding:9px 22px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn-save:hover{background:var(--navy2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:12px}.fl{font-size:12px;color:var(--t2);margin-bottom:5px;display:block;font-weight:500}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-aguardando{background:var(--amber-bg);color:var(--amber-t)}.badge-andamento{background:var(--blue-bg);color:var(--blue-t)}.badge-concluido{background:var(--green-bg);color:var(--green-t)}
.badge-critica{background:var(--red-bg);color:var(--red-t)}.badge-alta{background:var(--orange-bg);color:var(--orange-t)}.badge-media{background:var(--amber-bg);color:var(--amber-t)}.badge-baixa{background:var(--green-bg);color:var(--green-t)}
.badge-admin{background:var(--purple-bg);color:var(--purple-t)}.badge-user{background:var(--blue-bg);color:var(--blue-t)}.badge-pending{background:var(--amber-bg);color:var(--amber-t)}.badge-rejected{background:var(--red-bg);color:var(--red-t)}
.badge-ativo{background:var(--green-bg);color:var(--green-t)}.badge-manutencao{background:var(--amber-bg);color:var(--amber-t)}.badge-inativo{background:var(--bg);color:var(--t2)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;cursor:pointer;transition:all .15s;user-select:none}
.stat-card:hover{border-color:#94A3B8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.stat-card.active{border-color:var(--blue);background:var(--blue-bg)}
.stat-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-label{font-size:12px;color:var(--t2);margin-bottom:4px}.stat-value{font-size:30px;font-weight:600;color:var(--text);line-height:1}
.stat-card.active .stat-label,.stat-card.active .stat-value{color:var(--blue-t)}
/* TICKETS */
.ticket-list{display:flex;flex-direction:column;gap:8px}
.ticket-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;cursor:pointer;transition:all .15s}
.ticket-card:hover{border-color:#94A3B8;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.ticket-card.overdue{border-left:3px solid var(--red)}
.ticket-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.ticket-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ticket-id{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t3)}
.ticket-date{font-size:12px;color:var(--t3);white-space:nowrap}
.ticket-user{font-size:15px;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ticket-asset{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--bg);color:var(--t2);padding:2px 7px;border-radius:4px}
.ticket-desc{font-size:13px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.ticket-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.ticket-cat{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px}
.ticket-dl{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--t2);display:flex;align-items:center;gap:5px}
.ticket-dl.overdue{color:var(--red);font-weight:500}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,20,30,.55);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end}
.modal-panel{width:500px;height:100vh;background:var(--white);overflow-y:auto;box-shadow:-6px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--white);z-index:1}
.modal-body{padding:20px 24px;flex:1}.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--white)}
.btn-close{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px}
.btn-close:hover{background:var(--bg)}
.ms{margin-bottom:22px}.mst{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px;font-weight:500}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bg);font-size:14px;gap:12px}
.info-row:last-child{border-bottom:none}.info-key{color:var(--t2);flex-shrink:0}.info-val{font-weight:500;text-align:right}
.desc-box{font-size:14px;line-height:1.65;color:var(--text);background:var(--bg);padding:12px 14px;border-radius:var(--r)}
.admin-section{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.admin-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
/* PHOTO */
.photo-area{border:2px dashed var(--border);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--white);position:relative}
.photo-area:hover{border-color:var(--blue);background:var(--blue-bg)}.photo-area.has-photo{border-style:solid;border-color:var(--green)}
.photo-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{max-width:100%;max-height:200px;border-radius:var(--r);display:block;margin:0 auto}
.photo-wrap{position:relative;display:inline-block}
.photo-remove{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:var(--red);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
/* SUCCESS */
.success-box{text-align:center;padding:48px 24px}
.success-icon{width:64px;height:64px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--green);font-size:32px}
.protocol-id{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--blue-t);background:var(--blue-bg);padding:10px 24px;border-radius:var(--r);display:inline-block;margin:6px 0 14px;letter-spacing:2px}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}.empty-state i{font-size:48px;display:block;margin-bottom:12px}.empty-state p{font-size:14px}
/* CONFIRM */
.confirm-box{background:var(--red-bg);border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.confirm-box p{font-size:12px;color:var(--red-t);font-weight:500;flex:1}
.btn-cy{padding:5px 12px;background:var(--red);color:white;border:none;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-cn{padding:5px 12px;background:white;color:var(--t2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--blue-t);border-bottom-color:var(--blue)}
/* CHIPS */
.chip-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--t2);transition:all .15s;display:flex;align-items:center;gap:5px}
.chip:hover{border-color:#94A3B8;color:var(--text)}.chip.active{background:var(--navy);color:white;border-color:var(--navy)}
.chip-cnt{font-size:10px;background:var(--bg);color:var(--t3);padding:1px 5px;border-radius:9px}.chip.active .chip-cnt{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
/* USERS */
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.user-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.user-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;flex-shrink:0}
.user-info{flex:1;min-width:0}.user-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.user-email{font-size:12px;color:var(--t2);margin-top:2px;font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis}
