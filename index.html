<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sistema de Chamados TI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
/* Loading screen */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #0F1924;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.ls-logo {
  width: 60px; height: 60px; border-radius: 16px;
  background: rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: white; margin-bottom: 4px;
}
.ls-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 18px; font-weight: 600; color: white; }
.ls-sub   { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; color: rgba(255,255,255,.4); }
.ls-dots  { display: flex; gap: 7px; }
.ls-dot   { width: 8px; height: 8px; border-radius: 50%; background: rgba(2,132,199,.6); animation: lsdot 1.2s ease-in-out infinite; }
.ls-dot:nth-child(2){ animation-delay: .2s; }
.ls-dot:nth-child(3){ animation-delay: .4s; }
@keyframes lsdot { 0%,80%,100%{ transform:scale(.6); opacity:.4 } 40%{ transform:scale(1); opacity:1; background:#38BDF8; } }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0F1924;--navy2:#1a2d40;--bg:#F1F5F9;--white:#fff;--border:#E2E8F0;
  --text:#1E293B;--t2:#64748B;--t3:#94A3B8;
  --blue:#0284C7;--blue-bg:#E0F2FE;--blue-t:#0369A1;
  --green:#16A34A;--green-bg:#DCFCE7;--green-t:#15803D;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-t:#92400E;
  --red:#DC2626;--red-bg:#FEE2E2;--red-t:#991B1B;
  --orange-bg:#FFF7ED;--orange-t:#9A3412;
  --purple-bg:#F3E8FF;--purple-t:#6B21A8;
  --r:8px;--rl:12px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* AUTH */
.auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.auth-card{background:var(--white);border-radius:16px;padding:36px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:52px;height:52px;border-radius:12px;background:var(--navy);display:inline-flex;align-items:center;justify-content:center;color:white;font-size:26px;margin-bottom:10px}
.auth-logo h1{font-size:18px;font-weight:600}.auth-logo p{font-size:13px;color:var(--t2);margin-top:2px}
.auth-field{margin-bottom:16px}
.auth-label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.auth-input{width:100%;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.auth-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.remember-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);cursor:pointer;user-select:none}
.remember-row input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy)}
.auth-btn{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.auth-btn:hover{background:var(--navy2)}.auth-btn:disabled{background:var(--bg);color:var(--t3);cursor:not-allowed}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--t2)}
.auth-switch a{color:var(--blue);cursor:pointer;font-weight:500}
.auth-error{background:var(--red-bg);color:var(--red-t);font-size:13px;padding:10px 12px;border-radius:var(--r);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.auth-hint{background:var(--blue-bg);color:var(--blue-t);font-size:12px;padding:10px 12px;border-radius:var(--r);margin-bottom:16px;line-height:1.5}
.status-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--navy)}
.status-card{background:var(--white);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.status-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px}
/* NAVBAR */
.navbar{background:var(--navy);position:sticky;top:0;z-index:50;display:flex;align-items:center;padding:0 32px;height:56px;box-shadow:0 1px 0 rgba(255,255,255,.06)}
.navbar-brand{display:flex;align-items:center;gap:9px;color:white;font-size:15px;font-weight:600;margin-right:32px;flex-shrink:0}
.navbar-brand i{font-size:20px}
.navbar-nav{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto}
.nav-link{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:var(--r);color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative;flex-shrink:0}
.nav-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-link.active{background:rgba(2,132,199,.25);color:#38BDF8}
.nav-link i{font-size:16px}
.nav-badge{background:#EF4444;color:white;font-size:10px;font-weight:600;min-width:17px;height:17px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.navbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.navbar-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:13px}
.navbar-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.7)}
.navbar-username{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navbar-role{font-size:11px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);padding:2px 7px;border-radius:100px}
.navbar-logout{width:30px;height:30px;border-radius:var(--r);background:transparent;border:none;color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.navbar-logout:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.navbar-divider{width:1px;height:20px;background:rgba(255,255,255,.1)}
.btn-navbar{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-navbar:hover{background:rgba(255,255,255,.14);color:white}
.btn-navbar i{font-size:14px}
/* PAGE */
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:20px 0}
.page-header-inner{max-width:1200px;margin:0 auto;padding:0 32px}
.page-header h2{font-size:20px;font-weight:600}.page-header p{font-size:13px;color:var(--t2);margin-top:3px}
.page-body{max-width:1200px;margin:0 auto;padding:28px 32px}
/* FORMS */
input[type=text],input[type=date],input[type=password],textarea{width:100%;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select.sf{width:100%;padding:8px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
select.sf:focus{border-color:var(--blue)}
.form-wrap{max-width:640px;margin:0 auto}
.form-section{margin-bottom:22px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:8px}
.form-label span{color:var(--red)}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.cat-btn{padding:13px 8px;border:1px solid var(--border);border-radius:var(--rl);background:var(--white);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;color:var(--t2);transition:all .15s;font-family:'IBM Plex Sans',sans-serif;line-height:1.3}
.cat-btn:hover,.cat-btn.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t)}
.cat-btn.selected{font-weight:500}.cat-btn i{font-size:22px}
.prio-grid{display:flex;gap:8px;flex-wrap:wrap}
.prio-btn{padding:7px 20px;border:1px solid var(--border);border-radius:100px;background:transparent;cursor:pointer;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--t2);transition:all .15s}
.prio-btn:hover:not(.sel){background:var(--bg);border-color:var(--t3)}
.prio-btn.p-critica.sel{background:var(--red-bg);color:var(--red-t);border-color:#FCA5A5;font-weight:500}
.prio-btn.p-alta.sel{background:var(--orange-bg);color:var(--orange-t);border-color:#FED7AA;font-weight:500}
.prio-btn.p-media.sel{background:var(--amber-bg);color:var(--amber-t);border-color:#FCD34D;font-weight:500}
.prio-btn.p-baixa.sel{background:var(--green-bg);color:var(--green-t);border-color:#86EFAC;font-weight:500}
.btn-primary{width:100%;padding:12px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--navy2)}.btn-primary:disabled{background:var(--bg);color:var(--t3);cursor:not-allowed}
.btn-sec{padding:8px 16px;background:white;color:var(--text);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-sec:hover{background:var(--bg)}
.btn-icon{width:30px;height:30px;border-radius:var(--r);background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t2);transition:all .15s}
.btn-icon:hover{background:var(--bg);color:var(--text)}.btn-icon.danger:hover{background:var(--red-bg);color:var(--red-t);border-color:#FCA5A5}
.btn-save{padding:9px 22px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn-save:hover{background:var(--navy2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:12px}.fl{font-size:12px;color:var(--t2);margin-bottom:5px;display:block;font-weight:500}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-aguardando{background:var(--amber-bg);color:var(--amber-t)}.badge-andamento{background:var(--blue-bg);color:var(--blue-t)}.badge-concluido{background:var(--green-bg);color:var(--green-t)}
.badge-critica{background:var(--red-bg);color:var(--red-t)}.badge-alta{background:var(--orange-bg);color:var(--orange-t)}.badge-media{background:var(--amber-bg);color:var(--amber-t)}.badge-baixa{background:var(--green-bg);color:var(--green-t)}
.badge-admin{background:var(--purple-bg);color:var(--purple-t)}.badge-user{background:var(--blue-bg);color:var(--blue-t)}.badge-pending{background:var(--amber-bg);color:var(--amber-t)}.badge-rejected{background:var(--red-bg);color:var(--red-t)}
.badge-ativo{background:var(--green-bg);color:var(--green-t)}.badge-manutencao{background:var(--amber-bg);color:var(--amber-t)}.badge-inativo{background:var(--bg);color:var(--t2)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;cursor:pointer;transition:all .15s;user-select:none}
.stat-card:hover{border-color:#94A3B8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.stat-card.active{border-color:var(--blue);background:var(--blue-bg)}
.stat-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-label{font-size:12px;color:var(--t2);margin-bottom:4px}.stat-value{font-size:30px;font-weight:600;color:var(--text);line-height:1}
.stat-card.active .stat-label,.stat-card.active .stat-value{color:var(--blue-t)}
/* TICKETS */
.ticket-list{display:flex;flex-direction:column;gap:8px}
.ticket-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;cursor:pointer;transition:all .15s}
.ticket-card:hover{border-color:#94A3B8;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.ticket-card.overdue{border-left:3px solid var(--red)}
.ticket-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.ticket-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ticket-id{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t3)}
.ticket-date{font-size:12px;color:var(--t3);white-space:nowrap}
.ticket-user{font-size:15px;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ticket-asset{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--bg);color:var(--t2);padding:2px 7px;border-radius:4px}
.ticket-desc{font-size:13px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.ticket-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.ticket-cat{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px}
.ticket-dl{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--t2);display:flex;align-items:center;gap:5px}
.ticket-dl.overdue{color:var(--red);font-weight:500}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,20,30,.55);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end}
.modal-panel{width:500px;height:100vh;background:var(--white);overflow-y:auto;box-shadow:-6px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--white);z-index:1}
.modal-body{padding:20px 24px;flex:1}.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--white)}
.btn-close{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px}
.btn-close:hover{background:var(--bg)}
.ms{margin-bottom:22px}.mst{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px;font-weight:500}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bg);font-size:14px;gap:12px}
.info-row:last-child{border-bottom:none}.info-key{color:var(--t2);flex-shrink:0}.info-val{font-weight:500;text-align:right}
.desc-box{font-size:14px;line-height:1.65;color:var(--text);background:var(--bg);padding:12px 14px;border-radius:var(--r)}
.admin-section{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.admin-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
/* PHOTO */
.photo-area{border:2px dashed var(--border);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--white);position:relative}
.photo-area:hover{border-color:var(--blue);background:var(--blue-bg)}.photo-area.has-photo{border-style:solid;border-color:var(--green)}
.photo-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{max-width:100%;max-height:200px;border-radius:var(--r);display:block;margin:0 auto}
.photo-wrap{position:relative;display:inline-block}
.photo-remove{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:var(--red);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
/* SUCCESS */
.success-box{text-align:center;padding:48px 24px}
.success-icon{width:64px;height:64px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--green);font-size:32px}
.protocol-id{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--blue-t);background:var(--blue-bg);padding:10px 24px;border-radius:var(--r);display:inline-block;margin:6px 0 14px;letter-spacing:2px}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}.empty-state i{font-size:48px;display:block;margin-bottom:12px}.empty-state p{font-size:14px}
/* CONFIRM */
.confirm-box{background:var(--red-bg);border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.confirm-box p{font-size:12px;color:var(--red-t);font-weight:500;flex:1}
.btn-cy{padding:5px 12px;background:var(--red);color:white;border:none;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-cn{padding:5px 12px;background:white;color:var(--t2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--blue-t);border-bottom-color:var(--blue)}
/* CHIPS */
.chip-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--t2);transition:all .15s;display:flex;align-items:center;gap:5px}
.chip:hover{border-color:#94A3B8;color:var(--text)}.chip.active{background:var(--navy);color:white;border-color:var(--navy)}
.chip-cnt{font-size:10px;background:var(--bg);color:var(--t3);padding:1px 5px;border-radius:9px}.chip.active .chip-cnt{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
/* USERS */
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.user-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.user-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;flex-shrink:0}
.user-info{flex:1;min-width:0}.user-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.user-email{font-size:12px;color:var(--t2);margin-top:2px;font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:11px;color:var(--t3);margin-top:3px}.user-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn-approve{padding:6px 13px;background:var(--green-bg);color:var(--green-t);border:1px solid #86EFAC;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-approve:hover{background:#BBF7D0}
.btn-reject{padding:6px 13px;background:var(--red-bg);color:var(--red-t);border:1px solid #FCA5A5;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-reject:hover{background:#FECACA}
.btn-promote{padding:6px 13px;background:var(--purple-bg);color:var(--purple-t);border:1px solid #D8B4FE;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-promote:hover{background:#EDE9FE}
.btn-demote{padding:6px 13px;background:var(--bg);color:var(--t2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-demote:hover{background:#E2E8F0}
.btn-del{padding:6px 13px;background:var(--red-bg);color:var(--red-t);border:1px solid #FCA5A5;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-del:hover{background:#FECACA}
/* ROLES */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.role-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.role-card-hd{display:flex;align-items:flex-start;justify-content:space-between}
.role-icon{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.perm-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s;font-size:14px;user-select:none}
.perm-row:hover{border-color:var(--blue);background:var(--blue-bg)}.perm-row input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy)}
/* ASSETS */
/* timeline */
.timeline{display:flex;flex-direction:column;position:relative}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-item:not(:last-child)::before{content:"";position:absolute;left:14px;top:30px;bottom:0;width:2px;background:var(--border);z-index:0}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1;position:relative}
.tl-body{flex:1;padding-top:3px}
.tl-label{font-size:13px;font-weight:600;color:var(--text)}
.tl-desc{font-size:13px;color:var(--t2);margin-top:2px;line-height:1.5}
.tl-meta{font-size:11px;color:var(--t3);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.add-event-form{background:var(--bg);border-radius:var(--rl);padding:14px;border:1px solid var(--border);margin-top:12px}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.asset-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;transition:all .15s;cursor:pointer}
.asset-card:hover{border-color:#94A3B8;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.asset-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
.asset-icon{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.asset-tag{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--t2);background:var(--bg);padding:3px 8px;border-radius:4px}
.asset-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.ai{font-size:12px}.ai-l{color:var(--t3);display:block;margin-bottom:1px}.ai-v{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bg)}
.asset-actions{display:flex;gap:6px}
.btn-add{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-add:hover{background:var(--navy2)}
.asset-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.search-bar{display:flex;align-items:center;flex:1;max-width:480px;border:1.5px solid var(--border);border-radius:var(--rl);background:var(--white);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.search-bar:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
.sb-icon{padding:0 12px;color:var(--t3);font-size:16px;display:flex;align-items:center;flex-shrink:0}
.search-bar input{flex:1;padding:10px 0;font-size:13px;font-family:'IBM Plex Sans',sans-serif;border:none;outline:none;background:transparent;color:var(--text);min-width:0}
.search-bar input::placeholder{color:var(--t3)}
.sb-clear{padding:0 10px;color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;background:none;border:none;transition:color .15s}
.sb-clear:hover{color:var(--text)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:10px 20px;border-radius:var(--rl);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:999;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:768px){.modal-panel{width:100%}.two-col{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.cat-grid{grid-template-columns:repeat(2,1fr)}.page-body{padding:20px 16px}.page-header-inner{padding:0 16px}.navbar{padding:0 16px}.navbar-username,.navbar-role{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<div id="loading-screen">
  <div class="ls-logo">&#x1F3A7;</div>
  <div class="ls-title">TI Chamados</div>
  <div class="ls-sub" id="ls-msg">Carregando...</div>
  <div class="ls-dots">
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
  </div>
</div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;

// ── CONSTANTS ──────────────────────────────────────────────
const CATS=[
  {id:"internet",label:"Internet / Rede",icon:"ti-wifi"},
  {id:"notebook",label:"Notebook / PC",icon:"ti-device-laptop"},
  {id:"monitor",label:"Monitor / Tela",icon:"ti-device-desktop"},
  {id:"infra",label:"Infraestrutura",icon:"ti-server"},
  {id:"outro",label:"Outro",icon:"ti-tool"},
];
const PRIORITIES=[{id:"critica",label:"Crítica"},{id:"alta",label:"Alta"},{id:"media",label:"Média"},{id:"baixa",label:"Baixa"}];
const STATUSES=[{id:"aguardando",label:"Aguardando Análise"},{id:"andamento",label:"Em Andamento"},{id:"concluido",label:"Concluído"}];
const COMPANIES=["Taldi","Solarz","MJDP","Prevfam"];
const NB_BRANDS=["Dell","HP","Lenovo","Apple","Asus","Acer","Samsung","Microsoft"];
const MN_BRANDS=["Dell","Samsung","LG","AOC","Asus","Acer","HP","Philips","BenQ"];
const ASSET_ST=[{id:"ativo",label:"Ativo"},{id:"manutencao",label:"Em manutenção"},{id:"inativo",label:"Inativo"}];
const RAM_OPTS=["4 GB","8 GB","16 GB","32 GB","64 GB"];
const STOR_OPTS=["128 GB SSD","256 GB SSD","512 GB SSD","1 TB SSD","1 TB HD","2 TB HD"];
const RES_OPTS=["1920x1080 (Full HD)","2560x1440 (2K)","3840x2160 (4K)"];
const PANEL_OPTS=["IPS","VA","TN","OLED"];
const EVENT_TYPES=[
  {id:"added",      label:"Cadastrado",        icon:"ti-plus",         color:"var(--green-t)",  bg:"var(--green-bg)"},
  {id:"assigned",   label:"Atribuído",         icon:"ti-user-check",    color:"var(--blue-t)",   bg:"var(--blue-bg)"},
  {id:"transferred",label:"Transferido",       icon:"ti-arrows-right",  color:"var(--purple-t)", bg:"var(--purple-bg)"},
  {id:"returned",   label:"Devolvido",         icon:"ti-user-minus",    color:"var(--amber-t)",  bg:"var(--amber-bg)"},
  {id:"damaged",    label:"Em manutenção",     icon:"ti-tool",          color:"var(--orange-t)", bg:"var(--orange-bg)"},
  {id:"repaired",   label:"Retornou ativo",    icon:"ti-circle-check",  color:"var(--green-t)",  bg:"var(--green-bg)"},
  {id:"inactive",   label:"Desativado",        icon:"ti-archive",       color:"var(--t3)",       bg:"var(--bg)"},
  {id:"note",       label:"Observação",        icon:"ti-note",          color:"var(--t2)",       bg:"var(--bg)"},
];
const SCREENS=[
  {id:"form",label:"Novo Chamado",icon:"ti-plus"},
  {id:"dashboard",label:"Painel de Chamados",icon:"ti-layout-dashboard"},
  {id:"patrimonio",label:"Patrimônio",icon:"ti-devices"},
  {id:"mine",label:"Meus Chamados",icon:"ti-ticket"},
];
const SYS_ROLES=[
  {id:"role-admin",name:"Administrador",permissions:["form","dashboard","patrimonio","mine"],emailNotif:true, isSystem:true,color:"purple"},
  {id:"role-user", name:"Padrão",       permissions:["form","mine"],                       emailNotif:false,isSystem:true,color:"blue"},
];

// ── STORAGE ────────────────────────────────────────────────
const ls={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{
    localStorage.setItem(k,JSON.stringify(v));
    fetch("/api/db",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({[k]:v})}).catch(()=>{});
  },
  del:(k)=>localStorage.removeItem(k),
};
// Carrega dados do servidor e popula localStorage (para acesso online multi-usuário)
// Carrega dados do servidor e popula localStorage (para acesso online multi-usuário)
async function loadFromServer(){
  try{
    // O '?t=' + Date.now() impede que o navegador use cache na guia anônima
    const r=await fetch("/api/db?t=" + Date.now(), { cache: "no-store" });
    if(!r.ok)return;
    const db=await r.json();
    ["ti_users","ti_tickets","ti_roles","ti_assets","ti_seq"].forEach(k=>{
      if(db[k]!==undefined)localStorage.setItem(k,JSON.stringify(db[k]));
    });
  }catch(e){console.warn("Offline ou servidor indisponível:",e.message);}
}
// ── STORAGE & CONEXÃO COM SERVIDOR ─────────────────────────
const ss={
  get:(k,d)=>{try{const v=sessionStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>sessionStorage.setItem(k,JSON.stringify(v)),
  del:(k)=>sessionStorage.removeItem(k),
};

const enc=p=>{try{return btoa(unescape(encodeURIComponent(p)));}catch{return p;}};
const dec=p=>{try{return decodeURIComponent(escape(atob(p)));}catch{return p;}};
const genUID=()=>"u-"+Date.now()+Math.random().toString(36).slice(2,6);
const genRID=()=>"r-"+Date.now()+Math.random().toString(36).slice(2,6);
const genAID=()=>"a-"+Date.now()+Math.random().toString(36).slice(2,5);
// ID de chamado mais seguro (sem depender de cache)
const genTID=()=>"TI-" + Math.floor(Math.random() * 10000).toString().padStart(4, "0");

function resolveSession(){
  const ps=ls.get("ti_persist",null);
  if(ps&&ps.expiresAt&&Date.now()<ps.expiresAt)return ps;
  ls.del("ti_persist");
  return ss.get("ti_session",null);
}

// Única via de comunicação com o Raspberry Pi para salvar dados
const saveToDB = (data) => {
  fetch("/api/db", { 
    method: "POST", 
    headers: { "Content-Type": "application/json" }, 
    body: JSON.stringify(data) 
  }).catch(err => console.error("Erro ao salvar no servidor:", err));
};

// ── UTILS ──────────────────────────────────────────────────
const fmtDate=ts=>new Date(ts).toLocaleDateString("pt-BR");
const fmtDl=s=>{if(!s)return null;const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;};
const isOverdue=(dl,st)=>{
  if(!dl||st==="concluido")return false;
  const t=new Date();t.setHours(0,0,0,0);
  return new Date(dl+"T00:00:00")<t;
};
const getPerms=(session,roles)=>{
  if(session.role==="admin")return SCREENS.map(s=>s.id);
  const r=roles.find(r=>r.id===session.roleId)||roles.find(r=>r.id==="role-user");
  return r?r.permissions:["form","mine"];
};

function initData(){
  let roles=ls.get("ti_roles",[]);
  if(!roles.length){
    roles=[...SYS_ROLES];
    // CORREÇÃO: Usar localStorage diretamente para não sobrescrever o DB do servidor
    localStorage.setItem("ti_roles", JSON.stringify(roles)); 
  }
  let users=ls.get("ti_users",[]);
  if(!users.length){
    users=[{id:"admin-1",name:"Administrador",email:"admin@ti.local",password:enc("admin123"),role:"admin",roleId:"role-admin",company:"",createdAt:Date.now()}];
    // CORREÇÃO: Usar localStorage diretamente para não sobrescrever o DB do servidor
    localStorage.setItem("ti_users", JSON.stringify(users));
  }
  return {users,roles};
}

// ── SHARED COMPONENTS ──────────────────────────────────────
function Badge({type,label}){return <span className={`badge badge-${type}`}>{label}</span>;}

function ComboSelect({value,onChange,options,placeholder,cls}){
  const c=cls||"sf";
  const inList=options.includes(value);
  const[mode,setMode]=useState(value&&!inList?"custom":"select");
  if(mode==="custom")return(
    <div style={{display:"flex",gap:6}}>
      <input type="text" className={c} style={{flex:1}} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"Digite..."} autoFocus/>
      <button className="btn-icon" title="Voltar para lista" style={{flexShrink:0}} onClick={()=>{setMode("select");onChange("");}}>
        <i className="ti ti-list"/>
      </button>
    </div>
  );
  return(
    <select className={c} value={value} onChange={e=>{if(e.target.value==="__c__"){setMode("custom");onChange("");}else onChange(e.target.value);}}>
      <option value="">Selecione...</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
      <option value="__c__">✏️ Digitar outro...</option>
    </select>
  );
}

// ── AUTH SCREENS ───────────────────────────────────────────
function LoginScreen({users,onLogin,onGoRegister}){
  const saved=ls.get("ti_remember",null);
  const[email,setEmail]=useState(saved?saved.email:"");
  const[pwd,setPwd]=useState(saved?dec(saved.pwd):"");
  const[remember,setRemember]=useState(!!saved);
  const[err,setErr]=useState("");

  const handle=()=>{
    const u=users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&dec(u.password)===pwd);
    if(!u){setErr("E-mail ou senha incorretos.");return;}
    if(u.role==="rejected"){setErr("Sua conta foi recusada pelo administrador.");return;}
    setErr("");
    if(remember)ls.set("ti_remember",{email,pwd:enc(pwd)});
    else ls.del("ti_remember");
    onLogin(u);
  };

  return(
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon"><i className="ti ti-headset"/></div>
          <h1>TI Chamados</h1><p>Sistema de suporte técnico</p>
        </div>
        {err&&<div className="auth-error"><i className="ti ti-alert-circle"/>{err}</div>}
        <div className="auth-field"><label className="auth-label">E-mail</label>
          <input className="auth-input" type="text" placeholder="seu@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <div className="auth-field"><label className="auth-label">Senha</label>
          <input className="auth-input" type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <div className="auth-field">
          <label className="remember-row">
            <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/>
            Lembrar de mim
          </label>
        </div>
        <button className="auth-btn" onClick={handle} disabled={!email||!pwd}><i className="ti ti-login"/> Entrar</button>
        <div className="auth-switch">Não tem conta? <a onClick={onGoRegister}>Solicitar acesso</a></div>
      </div>
    </div>
  );
}

function RegisterScreen({users,roles,onRegister,onGoLogin}){
  const[form,setForm]=useState({name:"",email:"",pwd:"",conf:"",company:""});
  const[err,setErr]=useState("");
  const[done,setDone]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handle=()=>{
    if(form.pwd!==form.conf){setErr("As senhas não coincidem.");return;}
    if(form.pwd.length<4){setErr("Senha mínima de 4 caracteres.");return;}
    if(users.find(u=>u.email.toLowerCase()===form.email.toLowerCase())){setErr("E-mail já cadastrado.");return;}
    const def=roles.find(r=>r.id==="role-user")||roles[0];
    onRegister({id:genUID(),name:form.name.trim(),email:form.email.trim().toLowerCase(),password:enc(form.pwd),role:"pending",roleId:def?.id||"role-user",company:form.company,createdAt:Date.now()});
    setDone(true);
  };

  if(done)return(
    <div className="auth-screen">
      <div className="auth-card" style={{textAlign:"center"}}>
        <div className="status-icon" style={{background:"var(--amber-bg)",color:"var(--amber)",margin:"0 auto 18px"}}><i className="ti ti-clock"/></div>
        <h2 style={{marginBottom:8}}>Solicitação enviada!</h2>
        <p style={{fontSize:14,color:"var(--t2)",marginBottom:24,lineHeight:1.6}}>Sua conta aguarda aprovação do administrador.</p>
        <button className="auth-btn" style={{width:"auto",display:"inline-flex"}} onClick={onGoLogin}><i className="ti ti-arrow-left"/> Voltar ao login</button>
      </div>
    </div>
  );

  return(
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo"><div className="auth-logo-icon"><i className="ti ti-user-plus"/></div><h1>Solicitar acesso</h1><p>Crie sua conta</p></div>
        {err&&<div className="auth-error"><i className="ti ti-alert-circle"/>{err}</div>}
        <div className="auth-field"><label className="auth-label">Nome completo</label><input className="auth-input" type="text" placeholder="Seu nome" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
        <div className="auth-field"><label className="auth-label">E-mail</label><input className="auth-input" type="text" placeholder="seu@email.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
        <div className="auth-field"><label className="auth-label">Empresa</label>
          <ComboSelect value={form.company} onChange={v=>set("company",v)} options={COMPANIES} cls="auth-input" placeholder="Selecione ou digite..."/>
        </div>
        <div className="auth-field"><label className="auth-label">Senha</label><input className="auth-input" type="password" placeholder="Mínimo 4 caracteres" value={form.pwd} onChange={e=>set("pwd",e.target.value)}/></div>
        <div className="auth-field"><label className="auth-label">Confirmar senha</label><input className="auth-input" type="password" placeholder="Repita a senha" value={form.conf} onChange={e=>set("conf",e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/></div>
        <button className="auth-btn" onClick={handle} disabled={!form.name||!form.email||!form.pwd||!form.conf}><i className="ti ti-send"/> Solicitar acesso</button>
        <div className="auth-switch">Já tem conta? <a onClick={onGoLogin}>Fazer login</a></div>
      </div>
    </div>
  );
}

function PendingScreen({session,onLogout}){
  return(
    <div className="status-screen">
      <div className="status-card">
        <div className="status-icon" style={{background:"var(--amber-bg)",color:"var(--amber)"}}><i className="ti ti-clock"/></div>
        <h2 style={{marginBottom:8}}>Aguardando aprovação</h2>
        <p style={{fontSize:14,color:"var(--t2)",lineHeight:1.6,marginBottom:24}}>Olá, <strong>{session.name}</strong>! Sua conta ainda não foi aprovada.</p>
        <button className="btn-sec" onClick={onLogout}><i className="ti ti-logout"/> Sair</button>
      </div>
    </div>
  );
}
function RejectedScreen({session,onLogout}){
  return(
    <div className="status-screen">
      <div className="status-card">
        <div className="status-icon" style={{background:"var(--red-bg)",color:"var(--red)"}}><i className="ti ti-user-x"/></div>
        <h2 style={{marginBottom:8}}>Acesso recusado</h2>
        <p style={{fontSize:14,color:"var(--t2)",lineHeight:1.6,marginBottom:24}}>Seu acesso não foi aprovado. Entre em contato com o TI.</p>
        <button className="btn-sec" onClick={onLogout}><i className="ti ti-logout"/> Sair</button>
      </div>
    </div>
  );
}

  const[priority,setPriority]=useState(ticket.priority);
  const[deadline,setDeadline]=useState(ticket.deadline||"");
  const[notes,setNotes]=useState(ticket.adminNotes||"");

    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-panel">
        <div className="modal-header">
          <div>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"var(--t3)"}}>{ticket.id} · {fmtDate(ticket.createdAt)}</span>
            <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
              <Badge type={ticket.status} label={STATUSES.find(s=>s.id===ticket.status)?.label}/>

            {ticket.assetTag&&<div className="info-row"><span className="info-key">Patrimônio</span><span className="info-val" style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13}}>{ticket.assetTag}</span></div>}
            <div className="info-row"><span className="info-key">Categoria</span><span className="info-val"><i className={`ti ${cat?.icon}`} style={{marginRight:5,verticalAlign:-1}}/>{cat?.label}</span></div>
            <div className="info-row"><span className="info-key">Aberto em</span><span className="info-val">{fmtDate(ticket.createdAt)}</span></div>
            {ticket.deadline&&<div className="info-row"><span className="info-key">Prazo</span><span className="info-val" style={over?{color:"var(--red)"}:{}}>{fmtDl(ticket.deadline)}{over&&" · ⚠ Atrasado"}</span></div>}
          </div>
          <div className="ms">
            <div className="mst">Descrição</div>
            <div className="desc-box">{ticket.description}</div>
          </div>
          {ticket.photo&&<div className="ms"><div className="mst">Foto do Problema</div>
            <img src={ticket.photo} alt="Foto" style={{width:"100%",borderRadius:"var(--r)",border:"1px solid var(--border)",cursor:"pointer"}} onClick={()=>window.open(ticket.photo,"_blank")}/>
          </div>}

            <div className="desc-box" style={{background:"var(--blue-bg)",color:"var(--blue-t)"}}>{ticket.adminNotes}</div>
          </div>}
          {isAdmin&&<div className="admin-section">
            <div className="admin-section-title"><i className="ti ti-settings" style={{fontSize:16}}/>Painel do Técnico</div>
            <div className="two-col">
              <div className="fg"><label className="fl">Status</label>
                <select className="sf" value={status} onChange={e=>setStatus(e.target.value)}>
                  {STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
              </div>
              <div className="fg"><label className="fl">Prioridade</label>
                <select className="sf" value={priority} onChange={e=>setPriority(e.target.value)}>
                  {PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}

function AdminDashboard({tickets,onUpdate}){
  const[filter,setFilter]=useState("all");
  const[sel,setSel]=useState(null);
  const counts={all:tickets.length,aguardando:tickets.filter(t=>t.status==="aguardando").length,andamento:tickets.filter(t=>t.status==="andamento").length,concluido:tickets.filter(t=>t.status==="concluido").length};
  const filtered=(filter==="all"?tickets:tickets.filter(t=>t.status===filter)).slice().sort((a,b)=>b.createdAt-a.createdAt);
  const selT=sel?tickets.find(t=>t.id===sel):null;
  const stats=[
    {key:"all",label:"Total",icon:"ti-ticket",bg:"var(--blue-bg)",color:"var(--blue-t)"},
    {key:"aguardando",label:"Aguardando",icon:"ti-clock",bg:"var(--amber-bg)",color:"var(--amber-t)"},
    {key:"andamento",label:"Em andamento",icon:"ti-loader",bg:"var(--blue-bg)",color:"var(--blue-t)"},
    {key:"concluido",label:"Concluídos",icon:"ti-circle-check",bg:"var(--green-bg)",color:"var(--green-t)"},
  ];
  return(
    <div>
      <div className="stats-grid">
        {stats.map(s=><div key={s.key} className={`stat-card${filter===s.key?" active":""}`} onClick={()=>setFilter(s.key)}>
          <div className="stat-icon" style={{background:s.bg}}><i className={`ti ${s.icon}`} style={{color:s.color}}/></div>
          <div className="stat-label">{s.label}</div>
          <div className="stat-value">{counts[s.key]}</div>
        </div>)}
      </div>
      {filtered.length===0
        ?<div className="empty-state"><i className="ti ti-inbox"/><p>Nenhum chamado {filter!=="all"?"nesta categoria":"ainda"}</p></div>
        :<div className="ticket-list">{filtered.map((t, index)=><TicketCard key={`${t.id}-${index}`} ticket={t} onClick={()=>setSel(t.id)}/>)}</div>}
      {selT&&<TicketModal ticket={selT} isAdmin={true} onClose={()=>setSel(null)} onSave={u=>{onUpdate(selT.id,u);setSel(null);}}/>}

  );
}

  const handle=()=>{if(!can)return;const id=onSubmit({...form,photo:photo||null});setLastId(id);setSubmitted(true);};
  const reset=()=>{setSubmitted(false);setPhoto(null);setForm({userName:session.name,assetTag:"",category:"",priority:"media",description:""});};

    <div className="success-box">

            <div style={{fontSize:28,color:"var(--t3)",marginBottom:6}}><i className="ti ti-photo-up"/></div>

    </div>
  );
}

  const CBG={blue:"var(--blue-bg)",purple:"var(--purple-bg)",green:"var(--green-bg)",amber:"var(--amber-bg)",red:"var(--red-bg)"};

  const[color,setColor]=useState(role?.color||"blue");
  const[emailNotif,setEmailNotif]=useState(role?.emailNotif||false);

            <div style={{display:"flex",gap:8,marginTop:4}}>

                <i className={`ti ${s.icon}`} style={{fontSize:16,color:"var(--t2)"}}/>

                <div style={{fontSize:13,fontWeight:500,color:emailNotif?"var(--blue-t)":"var(--text)"}}>Receber notificações por e-mail</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:1}}>Usuários deste cargo receberão e-mail a cada novo chamado</div>
              </div>
            </label>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-sec" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={handle} disabled={!name.trim()||!perms.length} style={!name.trim()||!perms.length?{opacity:.5,cursor:"not-allowed"}:{}}><i className="ti ti-device-floppy"/>{role?" Salvar":" Criar cargo"}</button>
        </div>
      </div>
    </div>

// ── USER MANAGEMENT ────────────────────────────────────────
function UserManagement({users,roles,currentUser,onApprove,onReject,onPromote,onDemote,onDelete,onChangeRole}){
  const[tab,setTab]=useState("pending");
  const[confirmDel,setConfirmDel]=useState(null);
  const[companyF,setCompanyF]=useState("all");
  const pending=users.filter(u=>u.role==="pending");
  const active=users.filter(u=>u.role==="user"||u.role==="admin");
  const rejected=users.filter(u=>u.role==="rejected");
  const getRoleName=u=>{if(u.role==="admin")return"Administrador";const r=roles.find(r=>r.id===u.roleId);return r?r.name:"Padrão";};
  const companies=[...new Set(active.map(u=>u.company).filter(Boolean))];
  const filteredActive=companyF==="all"?active:active.filter(u=>u.company===companyF);

  function Actions({u}){
    if(confirmDel===u.id)return(
      <div className="confirm-box">
        <p><i className="ti ti-alert-triangle" style={{marginRight:4}}/>Excluir permanentemente?</p>
        <button className="btn-cy" onClick={()=>{onDelete(u.id);setConfirmDel(null);}}><i className="ti ti-trash"/>Excluir</button>
        <button className="btn-cn" onClick={()=>setConfirmDel(null)}>Cancelar</button>
      </div>
    );
    return(
      <div className="user-actions">
        {u.role==="pending"&&<><button className="btn-approve" onClick={()=>onApprove(u.id)}><i className="ti ti-check"/>Aprovar</button><button className="btn-reject" onClick={()=>onReject(u.id)}><i className="ti ti-x"/>Recusar</button></>}
        {u.role==="user"&&<>
          <label style={{fontSize:12,color:"var(--t2)"}}>Cargo:</label>
          <select className="sf" style={{width:"auto",fontSize:12,padding:"4px 8px"}} value={u.roleId||"role-user"} onChange={e=>onChangeRole(u.id,e.target.value)}>
            {roles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
          <button className="btn-promote" onClick={()=>onPromote(u.id)}><i className="ti ti-shield-up"/>Tornar Admin</button>
        </>}
        {u.role==="admin"&&u.id!==currentUser.id&&<button className="btn-demote" onClick={()=>onDemote(u.id)}><i className="ti ti-shield-down"/>Rebaixar</button>}
        {u.role==="rejected"&&<button className="btn-approve" onClick={()=>onApprove(u.id)}><i className="ti ti-rotate"/>Reativar</button>}
        {u.id===currentUser.id?<span style={{fontSize:12,color:"var(--t3)"}}>Você</span>:<button className="btn-del" onClick={()=>setConfirmDel(u.id)}><i className="ti ti-trash"/></button>}
      </div>
    );
  }

  function List({list,empty,showFilter}){
    if(!list.length&&!showFilter)return<div className="empty-state" style={{padding:"40px 20px"}}><i className="ti ti-users"/><p>{empty}</p></div>;
    return(
      <div>
        {showFilter&&companies.length>0&&<div className="chip-row">
          <span style={{fontSize:12,color:"var(--t3)",marginRight:4}}>Empresa:</span>
          {["all",...companies].map(c=>{
            const cnt=c==="all"?active.length:active.filter(u=>u.company===c).length;
            return<button key={c} className={`chip${companyF===c?" active":""}`} onClick={()=>setCompanyF(c)}>{c==="all"?"Todos":c}<span className="chip-cnt">{cnt}</span></button>;
          })}
        </div>}
        {list.length===0?<div className="empty-state" style={{padding:"40px 20px"}}><i className="ti ti-users"/><p>{empty}</p></div>
          :<div className="user-grid">{list.map(u=><div key={u.id} className="user-card">
            <div className="user-card-top">
              <div className="user-avatar"><i className="ti ti-user"/></div>
              <div className="user-info">
                <div className="user-name">{u.name}<Badge type={u.role==="admin"?"admin":u.role==="pending"?"pending":u.role==="rejected"?"rejected":"user"} label={u.role==="admin"?"Admin":u.role==="pending"?"Pendente":u.role==="rejected"?"Recusado":getRoleName(u)}/></div>
                <div className="user-email">{u.email}</div>
                {u.company&&<div className="user-meta"><i className="ti ti-building" style={{marginRight:4}}/>{u.company}</div>}
                <div className="user-meta">Cadastrado em {fmtDate(u.createdAt)}</div>
              </div>
            </div>
            <Actions u={u}/>
          </div>)}</div>}
      </div>
    );
  }

  return(
    <div>
      <div className="tabs">
        <button className={`tab-btn${tab==="pending"?" active":""}`} onClick={()=>setTab("pending")}>
          <i className="ti ti-clock"/>Pendentes
          {pending.length>0&&<span style={{background:"var(--red)",color:"white",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:9}}>{pending.length}</span>}
        </button>
        <button className={`tab-btn${tab==="active"?" active":""}`} onClick={()=>setTab("active")}><i className="ti ti-users"/>Usuários ativos</button>
        <button className={`tab-btn${tab==="rejected"?" active":""}`} onClick={()=>setTab("rejected")}><i className="ti ti-user-x"/>Recusados</button>
      </div>
      {tab==="pending" &&<List list={pending}        empty="Nenhuma solicitação pendente" showFilter={false}/>}
      {tab==="active"  &&<List list={filteredActive} empty="Nenhum usuário ativo"         showFilter={true}/>}
      {tab==="rejected"&&<List list={rejected}       empty="Nenhum usuário recusado"       showFilter={false}/>}
    </div>
  );
}

function AssetManagement({assets,users,session,onSave,onDelete}){
  const[tab,setTab]=useState("notebook");
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[search,setSearch]=useState("");
  const[companyF,setCompanyF]=useState("all");
  const typeAssets=assets.filter(a=>a.type===tab);
  const companies=[...new Set(typeAssets.map(a=>a.company).filter(Boolean))].sort();
  const list=typeAssets.filter(a=>{
    const mc=companyF==="all"||a.company===companyF;
    const q=search.toLowerCase();
    const ms=!search||(a.tag||"").toLowerCase().includes(q)||(a.brand||"").toLowerCase().includes(q)||(a.model||"").toLowerCase().includes(q)||(a.assignedUser||"").toLowerCase().includes(q)||(a.company||"").toLowerCase().includes(q)||(a.sector||"").toLowerCase().includes(q);
    return mc&&ms;
  });
  const nb=assets.filter(a=>a.type==="notebook").length;
  const mn=assets.filter(a=>a.type==="monitor").length;
  const switchTab=t=>{setTab(t);setSearch("");setCompanyF("all");setDetail(null);};

  // Gera eventos automáticos de histórico ao salvar
  const handleSave=form=>{
    const id=editing?editing.id:genAID();
    const prev=editing;
    let history=[...(form.history||prev?.history||[])];
    if(!prev){
      history=[{id:"h-"+Date.now(),type:"added",date:Date.now(),description:`${form.brand} ${form.model} cadastrado no sistema.`,by:session.name}];
    } else {
      // Mudança de responsável
      if(form.assignedUser!==prev.assignedUser){
        if(!form.assignedUser&&prev.assignedUser)
          history=[...history,{id:"h-"+Date.now(),type:"returned",date:Date.now(),description:`${prev.assignedUser} devolveu o equipamento. Disponível.`,by:session.name}];
        else if(form.assignedUser&&!prev.assignedUser)
          history=[...history,{id:"h-"+Date.now(),type:"assigned",date:Date.now(),description:`Atribuído a ${form.assignedUser}.`,by:session.name}];
        else
          history=[...history,{id:"h-"+Date.now(),type:"transferred",date:Date.now(),description:`Transferido de ${prev.assignedUser} para ${form.assignedUser}.`,by:session.name}];
      }
      // Mudança de status
      if(form.status!==prev.status){
        const desc={ativo:"Equipamento retornou ao status ativo.",manutencao:"Equipamento enviado para manutenção.",inativo:"Equipamento desativado / baixado."};
        const tp={ativo:"repaired",manutencao:"damaged",inativo:"inactive"};
        history=[...history,{id:"h-"+(Date.now()+1),type:tp[form.status]||"note",date:Date.now(),description:desc[form.status]||`Status: ${form.status}`,by:session.name}];
      }
    }
    onSave({...form,id,type:tab,history});
    setShowForm(false);setEditing(null);
    // Atualiza o detalhe aberto se for o mesmo equipamento
    if(detail&&detail.id===id) setDetail({...form,id,type:tab,history});
  };

  const handleAddEvent=(assetId,event)=>{
    const a=assets.find(x=>x.id===assetId);
    if(!a)return;
    const updated={...a,history:[...(a.history||[]),event]};
    onSave(updated);
    setDetail(updated);
  };

  const detailAsset=detail?assets.find(a=>a.id===detail.id)||detail:null;

  return(
    <div>
      <div className="tabs">
        <button className={`tab-btn${tab==="notebook"?" active":""}`} onClick={()=>switchTab("notebook")}>

        <button className={`tab-btn${tab==="monitor"?" active":""}`} onClick={()=>switchTab("monitor")}>
          <i className="ti ti-device-desktop"/>Monitores<span style={{background:"var(--purple-bg)",color:"var(--purple-t)",fontSize:11,fontWeight:600,padding:"1px 7px",borderRadius:9}}>{mn}</span>
        </button>
      </div>
      <div className="asset-toolbar">
        <div className="search-bar">
          <span className="sb-icon"><i className="ti ti-search"/></span>

          {search&&<button className="sb-clear" onClick={()=>setSearch("")}><i className="ti ti-x"/></button>}
        </div>
        <button className="btn-add" onClick={()=>{setEditing(null);setShowForm(true);}}><i className="ti ti-plus"/> Cadastrar {tab==="notebook"?"notebook":"monitor"}</button>
