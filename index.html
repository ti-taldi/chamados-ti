      {companies.length>0&&<div className="chip-row">
        <span style={{fontSize:12,color:"var(--t3)",marginRight:4}}>Empresa:</span>
        {["all",...companies].map(c=>{
          const cnt=c==="all"?typeAssets.length:typeAssets.filter(a=>a.company===c).length;
          return<button key={c} className={`chip${companyF===c?" active":""}`} onClick={()=>setCompanyF(c)}>{c==="all"?"Todos":c}<span className="chip-cnt">{cnt}</span></button>;
        })}
      </div>}
      {list.length===0
        ?<div className="empty-state"><i className={`ti ${tab==="notebook"?"ti-device-laptop":"ti-device-desktop"}`}/><p>{search||companyF!=="all"?"Nenhum resultado":"Nenhum equipamento cadastrado ainda"}</p></div>
        :<div className="asset-grid">{list.map(a=><AssetCard key={a.id} asset={a} type={tab}
            onOpenDetail={()=>setDetail(a)}
            onEdit={a=>{setDetail(null);setEditing(a);setShowForm(true);}}
            onDelete={onDelete}/>)}</div>}
      {showForm&&<AssetForm asset={editing} type={tab} users={users} onSave={handleSave} onClose={()=>{setShowForm(false);setEditing(null);}}/>}
      {detailAsset&&<AssetDetailModal
        asset={detailAsset} type={tab} session={session}
        onClose={()=>setDetail(null)}
        onEdit={()=>{setEditing(detailAsset);setDetail(null);setShowForm(true);}}
        onAddEvent={handleAddEvent}/>}
    </div>
  );
}

// ── EMAIL CONFIG + DIAGNÓSTICO ─────────────────────────────
function EmailConfig({users,roles,onClose}){
  const[cfg,setCfg]       = useState({host:"smtp.gmail.com",port:587,secure:false,user:"",pass:"",from:"",enabled:false});
  const[loading,setLoading] = useState(true);
  const[saving,setSaving]   = useState(false);
  const[testing,setTesting] = useState(false);
  const[tab,setTab]         = useState("config");
  const[diagLog,setDiagLog] = useState([]);
  const[diagRunning,setDiagRunning] = useState(false);
  const set=(k,v)=>setCfg(f=>({...f,[k]:v}));

  useEffect(()=>{
    fetch("/api/email-config").then(r=>r.json()).then(d=>{setCfg(d);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const save=async()=>{
    setSaving(true);
    try{
      const r=await fetch("/api/email-config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});
      const d=await r.json();
      if(d.ok) addLog("✅","Configurações salvas com sucesso!","green");
      else     addLog("❌","Erro ao salvar configurações.","red");
    }catch{ addLog("❌","Erro de conexão com o servidor.","red"); }
    setSaving(false);
  };

  const testConn=async()=>{
    setTesting(true);
    try{
      const r=await fetch("/api/email-test",{method:"POST"});
      const d=await r.json();
      if(d.ok) addLog("✅","Conexão SMTP bem-sucedida!","green");
      else     addLog("❌",`Falha SMTP: ${d.error}`,"red");
    }catch{ addLog("❌","Servidor não respondeu.","red"); }
    setTesting(false);
  };

  const addLog=(icon,msg,color)=>{
    setDiagLog(l=>[...l,{icon,msg,color,time:new Date().toLocaleTimeString("pt-BR")}]);
  };

  const runDiag=async()=>{
    setDiagRunning(true);
    setDiagLog([]);
    setTab("diag");

    // 1. Verifica config carregada
    const cfgNow=await fetch("/api/email-config").then(r=>r.json()).catch(()=>null);
    if(!cfgNow){ addLog("❌","Não foi possível carregar configurações do servidor.","red"); setDiagRunning(false); return; }
    addLog("📋","Configurações carregadas do servidor.","blue");

    // 2. Notificações ativas?
    if(!cfgNow.enabled){
      addLog("⚠️","Notificações DESATIVADAS. Ative o toggle na aba Configuração.","amber");
    } else {
      addLog("✅","Notificações estão ATIVAS.","green");
    }

    // 3. SMTP preenchido?
    if(!cfgNow.user||!cfgNow.host){
      addLog("⚠️","Host ou usuário SMTP não preenchido.","amber");
    } else {
      addLog("✅",`SMTP: ${cfgNow.host}:${cfgNow.port} | Usuário: ${cfgNow.user}`,"green");
    }

    // 4. Destinatários
    const notifUsers=users.filter(u=>{
      if(u.role==="pending"||u.role==="rejected")return false;
      if(u.role==="admin"){ const r=roles.find(r=>r.id==="role-admin"); return r?.emailNotif!==false; }
      const r=roles.find(r=>r.id===u.roleId);
      return r?.emailNotif===true;
    });
    const tos=notifUsers.map(u=>u.email).filter(Boolean);
    if(!tos.length){
      addLog("⚠️","Nenhum usuário com notificação ativa. Vá em Cargos → edite o cargo → ative 'Receber notificações'.","amber");
    } else {
      addLog("✅",`${tos.length} destinatário${tos.length!==1?"s":" "} configurado${tos.length!==1?"s":""}: ${tos.join(", ")}`,"green");
    }

    // 5. Testa conexão SMTP
    if(cfgNow.user&&cfgNow.host){
      addLog("🔌","Testando conexão SMTP...","blue");
      const r=await fetch("/api/email-test",{method:"POST"}).then(r=>r.json()).catch(()=>({ok:false,error:"timeout"}));
      if(r.ok) addLog("✅","Conexão SMTP OK! Servidor aceita autenticação.","green");
      else     addLog("❌",`Falha SMTP: ${r.error}. Verifique host, porta e senha.`,"red");
    }

    // Resumo
    const ok=cfgNow.enabled&&cfgNow.user&&cfgNow.host&&tos.length>0;
    addLog(ok?"🚀":"🔧", ok?"Tudo configurado! E-mails serão enviados normalmente.":"Corrija os itens acima para ativar os e-mails.","blue");
    setDiagRunning(false);
  };

  const logColor={green:"var(--green-t)",red:"var(--red-t)",amber:"var(--amber-t)",blue:"var(--blue-t)"};
  const logBg={green:"var(--green-bg)",red:"var(--red-bg)",amber:"var(--amber-bg)",blue:"var(--blue-bg)"};

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-panel" style={{width:500}}>
        <div className="modal-header">
          <div>
            <span style={{fontSize:11,color:"var(--t3)",fontFamily:"'IBM Plex Mono',monospace"}}>Configurações</span>
            <div style={{fontSize:16,fontWeight:600,marginTop:4,display:"flex",alignItems:"center",gap:8}}>
              <i className="ti ti-mail" style={{color:"var(--blue-t)"}}/>Notificações por E-mail
            </div>
          </div>
          <button className="btn-close" onClick={onClose}><i className="ti ti-x"/></button>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid var(--border)",padding:"0 24px"}}>
          {[{id:"config",label:"⚙️ Configuração"},{id:"diag",label:"🔍 Diagnóstico"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 16px",border:"none",borderBottom:tab===t.id?"2px solid var(--blue)":"2px solid transparent",background:"transparent",fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:500,color:tab===t.id?"var(--blue-t)":"var(--t2)",cursor:"pointer",marginBottom:-1}}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="modal-body">
          {loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Carregando...</div> : <>

          {tab==="config"&&<>
            {/* Toggle ativo */}
            <div style={{background:cfg.enabled?"var(--green-bg)":"var(--bg)",border:"1px solid",borderColor:cfg.enabled?"#86EFAC":"var(--border)",borderRadius:"var(--rl)",padding:"14px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>set("enabled",!cfg.enabled)}>
              <input type="checkbox" checked={cfg.enabled} onChange={e=>set("enabled",e.target.checked)} style={{width:16,height:16,accentColor:"var(--navy)",cursor:"pointer"}}/>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:cfg.enabled?"var(--green-t)":"var(--text)"}}>Notificações {cfg.enabled?"ativas":"desativadas"}</div>
                <div style={{fontSize:12,color:"var(--t3)",marginTop:1}}>Envia e-mail a cada novo chamado para usuários configurados</div>
              </div>
            </div>

            <div className="ms"><div className="mst">Servidor SMTP</div>
              <div className="two-col">
                <div className="fg"><label className="fl">Host SMTP</label><input type="text" className="sf" placeholder="smtp.gmail.com" value={cfg.host||""} onChange={e=>set("host",e.target.value)}/></div>
                <div className="fg"><label className="fl">Porta</label><input type="text" className="sf" placeholder="587" value={cfg.port||""} onChange={e=>set("port",parseInt(e.target.value)||587)}/></div>
              </div>
              <div className="fg"><label className="fl">Segurança</label>
                <select className="sf" value={cfg.secure?"ssl":"tls"} onChange={e=>set("secure",e.target.value==="ssl")}>
                  <option value="tls">TLS / STARTTLS (porta 587) — recomendado</option>
                  <option value="ssl">SSL (porta 465)</option>
                </select>
              </div>
            </div>
            <div className="ms"><div className="mst">Autenticação</div>
              <div className="fg"><label className="fl">E-mail / Usuário SMTP</label><input type="text" className="sf" placeholder="ti@suaempresa.com" value={cfg.user||""} onChange={e=>set("user",e.target.value)}/></div>
              <div className="fg"><label className="fl">Senha / App Password</label><input type="password" className="sf" placeholder="••••••••" value={cfg.pass||""} onChange={e=>set("pass",e.target.value)}/></div>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Remetente (from)</label><input type="text" className="sf" placeholder="TI Chamados <ti@empresa.com>" value={cfg.from||""} onChange={e=>set("from",e.target.value)}/></div>
            </div>
            <div style={{background:"var(--blue-bg)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:12,color:"var(--blue-t)",marginTop:12,lineHeight:1.6}}>
              <strong>Gmail:</strong> Use uma <em>App Password</em> em myaccount.google.com → Segurança → Senhas de app (não a senha normal).
            </div>
          </>}

          {tab==="diag"&&<>
            <div style={{marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{fontSize:13,color:"var(--t2)"}}>Verifica cada etapa do envio de e-mail.</p>
              <button className="btn-add" style={{padding:"7px 14px",fontSize:12}} onClick={runDiag} disabled={diagRunning}>
                <i className="ti ti-refresh"/>{diagRunning?"Verificando...":"Rodar diagnóstico"}
              </button>
            </div>
            {diagLog.length===0&&!diagRunning&&(
              <div style={{textAlign:"center",padding:"32px 0",color:"var(--t3)"}}>
                <i className="ti ti-stethoscope" style={{fontSize:36,display:"block",marginBottom:10}}/>
                <p style={{fontSize:13}}>Clique em "Rodar diagnóstico" para verificar tudo</p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {diagLog.map((l,i)=>(
                <div key={i} style={{background:logBg[l.color]||"var(--bg)",borderRadius:"var(--r)",padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:15,flexShrink:0}}>{l.icon}</span>
                  <span style={{fontSize:13,color:logColor[l.color]||"var(--text)",flex:1,lineHeight:1.5}}>{l.msg}</span>
                  <span style={{fontSize:11,color:"var(--t3)",flexShrink:0,fontFamily:"'IBM Plex Mono',monospace"}}>{l.time}</span>
                </div>
              ))}
              {diagRunning&&<div style={{textAlign:"center",padding:"12px 0",color:"var(--t3)",fontSize:13}}>⏳ Verificando...</div>}
            </div>
          </>}
          </>}
        </div>

        <div className="modal-footer">
          {tab==="config"&&<>
            <button className="btn-sec" onClick={testConn} disabled={testing||loading}><i className="ti ti-plug"/>{testing?"Testando...":"Testar SMTP"}</button>
            <button className="btn-sec" onClick={onClose}>Fechar</button>
            <button className="btn-save" onClick={save} disabled={saving||loading}><i className="ti ti-device-floppy"/>{saving?"Salvando...":"Salvar"}</button>
          </>}
          {tab==="diag"&&<button className="btn-sec" onClick={onClose}>Fechar</button>}
        </div>
      </div>
    </div>
  );
}

/// ── APP ────────────────────────────────────────────────────
function App() {
  const [isReady, setIsReady] = useState(false); // Esta é a chave de ouro
  const [users, setUsers] = useState([]);
  const [roles, setRoles] = useState([]);
  const [tickets, setTickets] = useState([]);
  const [assets, setAssets] = useState([]);
  
  const [session, setSession] = useState(() => resolveSession());
  const [authView, setAuthView] = useState("login");
  const [view, setView] = useState("form");
  const [toast, setToast] = useState(null);
  const [showEmailCfg, setShowEmailCfg] = useState(false);

  // 1. CARREGAMENTO BLINDADO: Puxa do Raspberry Pi ANTES de desenhar a tela
  useEffect(() => {
    // O '?t=Date.now()' força a guia anônima a ignorar caches antigos
    fetch("/api/db?t=" + Date.now(), { cache: "no-store" })
      .then(res => res.json())
      .then(db => {
        // Alimenta o sistema com as verdades do servidor
        setUsers(db.ti_users || []);
        setRoles(db.ti_roles || []);
        setTickets(db.ti_tickets || []);
        setAssets(db.ti_assets || []);
        
        setIsReady(true); // Libera o app!
        const el = document.getElementById("loading-screen");
        if (el) { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }
      })
      .catch(err => {
        console.error("Servidor indisponível", err);
        alert("Erro fatal: Não foi possível conectar ao banco de dados!");
      });
  }, []);

  // 2. Sincroniza sessão se um admin mudar as permissões do usuário logado
  useEffect(() => {
    if (!isReady || !session) return;
    const live = users.find(u => u.id === session.id);
    if (live && (live.role !== session.role || live.roleId !== session.roleId)) {
      const s = { ...session, role: live.role, roleId: live.roleId };
      setSession(s);
      ss.set("ti_session", s);
    }
  }, [users, session, isReady]);

  const isAdmin = session?.role === "admin";
  const perms = session ? getPerms(session, roles) : [];
  const pendingCnt = users.filter(u => u.role === "pending").length;

  const allNav = [
    { id: "form", label: "Novo Chamado", icon: "ti-plus" },
    { id: "dashboard", label: "Painel de Chamados", icon: "ti-layout-dashboard" },
    { id: "patrimonio", label: "Patrimônio", icon: "ti-devices" },
    { id: "mine", label: "Meus Chamados", icon: "ti-ticket" }
  ];

  const navItems = [...allNav.filter(n => perms.includes(n.id)), ...(isAdmin ? [
    { id: "users", label: "Usuários", icon: "ti-users", badge: pendingCnt },
    { id: "cargos", label: "Cargos", icon: "ti-shield" }
  ] : [])];

  useEffect(() => {
    if (!isReady || !session) return;
    const ids = navItems.map(n => n.id);
    if (!ids.includes(view)) setView(ids[0] || "form");
    // eslint-disable-next-line
  }, [session?.roleId, session?.role, isReady]);

  // =========================================================
  // SEGREDO AQUI: O aplicativo trava numa tela em branco se não baixou os dados
  // =========================================================
  if (!isReady) return null;

  const showToast = (msg, icon = "ti-check", color = "var(--green)") => {
    setToast({ msg, icon, color });
    setTimeout(() => setToast(null), 3000);
  };

  const sendEmailNotif = async ticket => {
    try {
      const notifUsers = users.filter(u => {
        if (u.role === "pending" || u.role === "rejected") return false;
        if (u.role === "admin") {
          const r = roles.find(r => r.id === "role-admin");
          return r?.emailNotif !== false;
        }
        const r = roles.find(r => r.id === u.roleId);
        return r?.emailNotif === true;
      });
      const to = notifUsers.map(u => u.email).filter(Boolean);
      if (!to.length) return;
      const res = await fetch("/api/send-email", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ to, ticket }) });
      const d = await res.json();
      if (d.skipped) return;
      if (d.ok) showToast(`📧 E-mail enviado para ${d.sent} destinatário${d.sent !== 1 ? "s" : ""}!`, "ti-mail", "var(--blue-t)");
      else showToast(`⚠️ Falha no e-mail: ${d.error}`, "ti-alert-circle", "var(--amber-t)");
    } catch (e) { console.warn("[E-mail] Erro de rede:", e.message); }
  };

  const login = u => {
    const s = { id: u.id, name: u.name, email: u.email, role: u.role, roleId: u.roleId };
    setSession(s);
    ss.set("ti_session", s);
    const saved = ls.get("ti_remember", null);
    if (saved) ls.set("ti_persist", { ...s, expiresAt: Date.now() + 8 * 60 * 60 * 1000 });
    setView(u.role === "admin" ? "dashboard" : "form");
  };

  const logout = () => {
    setSession(null);
    ss.del("ti_session");
    ls.del("ti_persist");
    setAuthView("login");
  };

  const register = u => {
    const up = [...users, u];
    setUsers(up);
    saveToDB({ ti_users: up });
    setAuthView("login");
  };

  const submitTicket = form => {
    const id = genTID();
    const t = { id, createdAt: Date.now(), status: "aguardando", deadline: null, adminNotes: "", userId: session.id, userEmail: session.email, ...form };
    const up = [...tickets, t];
    setTickets(up);
    saveToDB({ ti_tickets: up });
    sendEmailNotif(t);
    sendTicketConfirm(t);
    return id;
  };

  const sendTicketConfirm = async ticket => {
    if (!ticket.userEmail) return;
    try { await fetch("/api/send-ticket-confirm", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ticket }) }); } 
    catch (e) { console.warn("[E-mail] Confirmação:", e.message); }
  };

  const updateTicket = (id, updates) => {
    const ticket = tickets.find(t => t.id === id);
    
    // Corrige duplicação no React garantindo o state mais atual
    setTickets(currentTickets => 
      currentTickets.map(t => t.id === id ? { ...t, ...updates, updatedAt: Date.now() } : t)
    );

    // Prepara para salvar no DB
    const upForDB = tickets.map(t => t.id === id ? { ...t, ...updates, updatedAt: Date.now() } : t);
    saveToDB({ ti_tickets: upForDB });

    if (ticket && ticket.userEmail) {
      const statusChanged = updates.status && updates.status !== ticket.status;
      const notesChanged = updates.adminNotes !== undefined && updates.adminNotes.trim() !== '' && updates.adminNotes !== ticket.adminNotes;
      if (statusChanged || notesChanged) {
        fetch("/api/send-ticket-update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ticket, updates }) })
          .then(r => r.json()).then(d => { if (d.ok && !d.skipped) showToast("📧 Solicitante notificado por e-mail!", "ti-mail", "var(--green-t)"); }).catch(() => {});
      }
    }
  };

  const userAction = (id, role) => {
    const up = users.map(u => u.id === id ? { ...u, role } : u);
    setUsers(up);
    saveToDB({ ti_users: up });
  };

  const deleteUser = id => {
    const up = users.filter(u => u.id !== id);
    setUsers(up);
    saveToDB({ ti_users: up });
  };

  const changeRole = (uid, rid) => {
    const up = users.map(u => u.id === uid ? { ...u, roleId: rid } : u);
    setUsers(up);
    saveToDB({ ti_users: up });
  };

  const saveRole = role => {
    const up = roles.find(r => r.id === role.id) ? roles.map(r => r.id === role.id ? role : r) : [...roles, role];
    setRoles(up);
    saveToDB({ ti_roles: up });
  };

  const deleteRole = id => {
    const up2 = users.map(u => u.roleId === id ? { ...u, roleId: "role-user" } : u);
    setUsers(up2);
    const up = roles.filter(r => r.id !== id);
    setRoles(up);
    saveToDB({ ti_roles: up, ti_users: up2 });
  };

  const saveAsset = asset => {
    const up = assets.find(a => a.id === asset.id) ? assets.map(a => a.id === asset.id ? asset : a) : [...assets, asset];
    setAssets(up);
    saveToDB({ ti_assets: up });
  };

  const deleteAsset = id => {
    const up = assets.filter(a => a.id !== id);
    setAssets(up);
    saveToDB({ ti_assets: up });
  };

  const exportData = () => {
    const data = { exportedAt: new Date().toISOString(), tickets, assets, roles, users: users.map(({ password, ...u }) => u) };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `chamados-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    showToast("Backup exportado com sucesso!");
  };

  const importData = e => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.tickets || !data.users) throw new Error();
        const merged = data.users.map(u => {
          const ex = users.find(x => x.id === u.id);
          return ex ? { ...u, password: ex.password } : { ...u, password: enc("trocar123") };
        });
        setTickets(data.tickets);
        setUsers(merged);
        if (data.assets) setAssets(data.assets);
        if (data.roles) setRoles([...SYS_ROLES, ...(data.roles || []).filter(r => !r.isSystem)]);
        
        saveToDB({ ti_users: merged, ti_tickets: data.tickets, ti_assets: data.assets||[], ti_roles: data.roles? [...SYS_ROLES, ...data.roles.filter(r=>!r.isSystem)] : SYS_ROLES });
        showToast(`Importado: ${data.tickets.length} chamados, ${merged.length} usuários`);
      } catch {
        showToast("Arquivo inválido", "ti-alert-circle", "var(--red)");
      }
    };
    r.readAsText(file);
    e.target.value = "";
  };

  if (!session) return authView === "login" ? <LoginScreen users={users} onLogin={login} onGoRegister={() => setAuthView("register")} /> : <RegisterScreen users={users} roles={roles} onRegister={register} onGoLogin={() => setAuthView("login")} />;
  if (session.role === "pending") return <PendingScreen session={session} onLogout={logout} />;
  if (session.role === "rejected") return <RejectedScreen session={session} onLogout={logout} />;

  const pageInfo = {
    form: { title: "Novo Chamado", desc: "Preencha o formulário para abrir um chamado" },
    dashboard: { title: "Painel de Chamados", desc: `${tickets.length} chamado${tickets.length !== 1 ? "s" : ""} no sistema` },
    patrimonio: { title: "Patrimônio", desc: `${assets.filter(a => a.type === "notebook").length} notebooks · ${assets.filter(a => a.type === "monitor").length} monitores` },
    mine: { title: "Meus Chamados", desc: `${tickets.filter(t => t.userId === session.id).length} chamados` },
    users: { title: "Gestão de Usuários", desc: pendingCnt > 0 ? `${pendingCnt} aguardando aprovação` : "Gerencie usuários" },
    cargos: { title: "Cargos", desc: `${roles.length} cargo${roles.length !== 1 ? "s" : ""} configurados` }
  };

  return (
    <>
      <nav className="navbar">
        <div className="navbar-brand">
          <i className="ti ti-headset"></i>TI Chamados
        </div>
        <div className="navbar-nav">
          {navItems.map(v => (
            <div key={v.id} className={`nav-link${view === v.id ? " active" : ""}`} onClick={() => setView(v.id)}>
              <i className={`ti ${v.icon}`}></i>{v.label}
              {v.badge > 0 && <span className="nav-badge">{v.badge}</span>}
            </div>
          ))}
        </div>
        <div className="navbar-right">
          {isAdmin && (
            <>
              <button className="btn-navbar" onClick={exportData}><i className="ti ti-download"></i>Exportar</button>
              <label className="btn-navbar">
                <i className="ti ti-upload"></i>Importar
                <input type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
              </label>
              <button className="btn-navbar" onClick={() => setShowEmailCfg(true)} title="Configurar e-mail"><i className="ti ti-mail"></i>E-mail</button>
              <div className="navbar-divider"></div>
            </>
          )}
          <div className="navbar-user">
            <div className="navbar-avatar"><i className="ti ti-user"></i></div>
            <span className="navbar-username">{session.name}</span>
            <span className="navbar-role">{isAdmin ? "Admin" : roles.find(r => r.id === session.roleId)?.name || "Usuário"}</span>
          </div>
          <button className="navbar-logout" onClick={logout} title="Sair"><i className="ti ti-logout"></i></button>
        </div>
      </nav>

      <div className="page-header">
        <div className="page-header-inner">
          <h2>{pageInfo[view]?.title}</h2>
          <p>{pageInfo[view]?.desc}</p>
        </div>
      </div>

      <div className="page-body">
        {view === "form" && <NewTicketForm session={session} onSubmit={submitTicket} />}
        {view === "dashboard" && isAdmin && <AdminDashboard tickets={tickets} onUpdate={updateTicket} />}
        {view === "patrimonio" && <AssetManagement assets={assets} users={users} session={session} onSave={saveAsset} onDelete={deleteAsset} />}
        {view === "mine" && <MyTickets tickets={tickets} session={session} />}
        {view === "users" && isAdmin && <UserManagement users={users} roles={roles} currentUser={session} onApprove={id => userAction(id, "user")} onReject={id => userAction(id, "rejected")} onPromote={id => userAction(id, "admin")} onDemote={id => userAction(id, "user")} onDelete={deleteUser} onChangeRole={changeRole} />}
        {view === "cargos" && isAdmin && <RoleManagement roles={roles} onSave={saveRole} onDelete={deleteRole} />}
      </div>

      {toast && <div className="toast"><i className={`ti ${toast.icon}`} style={{ color: toast.color, fontSize: 16 }}></i>{toast.msg}</div>}
      {showEmailCfg && <EmailConfig users={users} roles={roles} onClose={() => setShowEmailCfg(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
